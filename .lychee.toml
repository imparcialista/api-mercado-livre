# Lychee config for docs link validation

verbose = true
no_progress = true
include_mail = false
max_retries = 3
retry_wait_time = 2
timeout = 20
accept = [200, 206, 301, 302, 403, 429]

exclude = [
  "https://imparcialista.github.io/api-mercado-livre/",
  "http://127.0.0.1:8000",
  "https://developers.mercadolivre.com.br/.*"
]
