site_name: API Mercado Livre Docs
site_description: Documentacao e exemplos em Python para API do Mercado Livre
site_url: https://imparcialista.github.io/api-mercado-livre/
repo_url: https://github.com/imparcialista/api-mercado-livre
repo_name: imparcialista/api-mercado-livre
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

theme:
  name: material
  language: pt-BR
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/imparcialista/api-mercado-livre

nav:
  - Início: index.md
  - Guias:
      - "Capítulo 01 · Autenticação OAuth e geração de tokens": 01-criar-aplicativo-e-token.md
      - "Capítulo 02 · Consultar anúncios (items/search)": 02-primeira-consulta-anuncios.md
      - "Capítulo 03 · Detalhes de itens em lote e exportação": 03-detalhes-itens-lote-exportacao.md
      - "Capítulo 04 · Atualizar preço e estoque com segurança": 04-atualizar-preco-estoque.md
      - "Capítulo 05 · Resiliência: erros, timeout e rate limit": 05-tratamento-erros-rate-limit.md
      - "Capítulo 06 · Consultar pedidos e exportar": 06-consultar-pedidos.md
  - Referência:
      - Tags: tags.md
      - Cookbook: cookbook.md
      - Snippets: snippets.md
      - Changelog: changelog.md
      - Template de Capítulo: template-novo-capitulo.md
